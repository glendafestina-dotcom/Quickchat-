name: Run Java Unit Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download JARs
        run: |
          mkdir -p lib
          curl -L -o lib/junit-platform-console-standalone-1.10.2.jar \
            https://repo1.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.10.2/junit-platform-console-standalone-1.10.2.jar
          curl -L -o lib/json-simple-1.1.1.jar \
            https://repo1.maven.org/maven2/com/googlecode/json-simple/json-simple/1.1.1/json-simple-1.1.1.jar

      - name: Compile Java files
        run: |
          mkdir -p out
          javac -cp "lib/*" -d out src/Message.java src/MessageTest.java

      - name: Run Tests
        run: |
          java -jar lib/junit-platform-console-standalone-1.10.2.jar \
            --class-path "out:lib/*" \
            --scan-class-path
